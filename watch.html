<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>1000 Dot-to-Dot &middot; Watch It Draw</title>
<style>
  :root{ --ink:#111418; --dot:#9fa5ad; --dotDone:#111418; --accent:#e4572e; --bg:#fbfbf9; --muted:#8a9099; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--ink);overflow:hidden;
    overscroll-behavior:none;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;}
  svg{width:min(94vw,94vh);height:min(94vw,94vh);display:block;}
  #full{fill:none;stroke:none;}                 /* hidden; only used for measuring */
  .ink{fill:none;stroke:var(--ink);stroke-width:2;stroke-linecap:round;
    stroke-linejoin:round;vector-effect:non-scaling-stroke;}
  .dot{fill:var(--dot);transition:fill .25s;}
  .dot.done{fill:var(--dotDone);}
  #nib{fill:var(--accent);transition:opacity .5s;}
  #bar{position:fixed;left:0;top:0;height:3px;width:0%;background:var(--accent);z-index:5;}
  #hud{position:fixed;left:0;right:0;top:0;padding:16px 20px;display:flex;align-items:baseline;gap:14px;pointer-events:none;z-index:3;}
  #title{font-size:15px;font-weight:700;}
  #title span{font-weight:400;color:var(--muted);}
  #credit{font-size:11px;color:var(--muted);}
  #count{margin-left:auto;font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;color:var(--muted);}
  #controls{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;}
  #btns{position:fixed;right:20px;bottom:22px;z-index:6;display:flex;gap:8px;}
  #controls button,#controls a,#btns button,#btns a{font:inherit;font-size:13px;font-weight:600;color:var(--ink);background:#fff;
    border:1px solid #d7dbe0;border-radius:999px;padding:7px 14px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.05);
    text-decoration:none;display:inline-block;}
  #controls button:hover,#controls a:hover,#btns button:hover,#btns a:hover{border-color:var(--accent);color:var(--accent);}
  /* "Next drawing" prompt joins the controls row at the completion beat */
  #nextBtn{display:none;background:var(--accent);border-color:var(--accent);color:#fff;}
  #nextBtn.show{display:inline-block;}
  #nextBtn:hover{background:var(--ink);border-color:var(--ink);color:#fff;}
  #playBtn{min-width:76px;background:var(--ink);color:#fff;border-color:var(--ink);}
  #playBtn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
  #speedBtn{min-width:56px;}
  @media (max-width:560px){ #controls{bottom:70px;} }
  #done{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:opacity .5s;pointer-events:none;z-index:5;}
  @media (max-width:560px){ #done{bottom:118px;} }
  /* Featured-drawings switcher (populated from art/manifest.js) */
  #gallery{position:fixed;right:20px;bottom:64px;background:#fff;border:1px solid #d7dbe0;border-radius:14px;
    padding:8px;z-index:7;box-shadow:0 8px 28px rgba(0,0,0,.12);display:none;max-height:60vh;overflow:auto;
    min-width:240px;max-width:calc(100vw - 40px);}
  #gallery.open{display:block;}
  .galItem{display:flex;gap:10px;align-items:center;padding:7px 9px;border-radius:10px;text-decoration:none;color:var(--ink);}
  .galItem:hover{background:#f2f4f6;}
  .galItem.current{outline:2px solid var(--accent);}
  .galCover{width:34px;height:46px;border-radius:4px;background:#e8ebee;flex:0 0 auto;display:flex;
    align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--muted);overflow:hidden;}
  .galCover img{width:100%;height:100%;object-fit:cover;display:block;}
  .galTitle{font-size:13px;font-weight:700;}
  .galBook{font-size:11px;color:var(--muted);}
  /* Book card shown at the completion moment */
  #bookCard{position:fixed;left:50%;bottom:118px;transform:translateX(-50%);display:flex;gap:12px;align-items:center;
    background:#fff;border:1px solid #d7dbe0;border-radius:14px;padding:10px 14px;opacity:0;transition:opacity .5s;
    pointer-events:none;z-index:5;box-shadow:0 4px 18px rgba(0,0,0,.1);}
  #bookCard.show{opacity:1;pointer-events:auto;}
  #bookCard .galCover{width:44px;height:60px;font-size:18px;}
  .bcFrom{font-size:11px;color:var(--muted);}
  .bcBook{font-size:13px;font-weight:700;max-width:240px;}
  .bcBuy{font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;}
  .bcBuy:hover{text-decoration:underline;}
  @media (max-width:560px){ #bookCard{bottom:166px;} }
</style>
</head>

        const c=document.createElementNS(NS,"circle");
        c.setAttribute("cx",p.x); c.setAttribute("cy",p.y); c.setAttribute("r",R);
        c.setAttribute("class","dot"); f1.appendChild(c); dotEls.push(c);
      });
      gDots.appendChild(f1);

      // ---- Geometry core (identical approach to index.html: no dash math) ----
      const cmds=art.d.match(/[MLCZ][^MLCZ]*/g);
      const tmp=document.createElementNS(NS,"path"); svg.appendChild(tmp); tmp.setAttribute("style","stroke:none;fill:none");
      let acc="", lenAt=[];
      for(let k=0;k<cmds.length;k++){ acc+=cmds[k]; tmp.setAttribute("d",acc); lenAt.push(tmp.getTotalLength()); }
      svg.removeChild(tmp);
      const LEN=lenAt[lenAt.length-1];

      function dotsReached(d){ let lo=0,hi=lenAt.length;
        while(lo<hi){const m=(lo+hi)>>1; if(lenAt[m]<=d) lo=m+1; else hi=m;} return lo; }

      let doneStr="", doneCount=0;
      function setDone(reached){
        if(reached===doneCount) return;
        if(reached>doneCount){ for(let k=doneCount;k<reached;k++) doneStr+=cmds[k]; }
        else { doneStr = reached>0 ? cmds.slice(0,reached).join("") : ""; }
        doneCount=reached;
        inkDone.setAttribute("d",doneStr);
      }

      // ---- Time-driven reveal: the pen moves at constant speed along the path ----
      const DURATION=75;              // seconds for the full drawing at 1×
      const SPEEDS=[0.5,1,2,4];
      let drawn=0, playing=true, speed=1, prev=-1, last=null, raf=null;

      function update(){
        const reached=dotsReached(drawn);
        setDone(reached);
        if(reached>0 && reached<cmds.length && drawn>lenAt[reached-1]){
          const a=PTS[reached-1], p=full.getPointAtLength(drawn);
          inkPartial.setAttribute("d","M"+a.x+" "+a.y+"L"+p.x+" "+p.y);
        } else {
          inkPartial.setAttribute("d","");
        }
        const tip=full.getPointAtLength(drawn);
        nib.setAttribute("cx",tip.x); nib.setAttribute("cy",tip.y);
        if(reached!==prev){
          const lo=Math.min(reached,Math.max(prev,0)), hi=Math.max(reached,prev);
          for(let k=lo;k<hi && k<dotEls.length;k++)
            dotEls[k].setAttribute("class", k<reached ? "dot done" : "dot");
          prev=reached;
          count.textContent="Dot "+reached+" / "+N;
        }
        bar.style.width=(drawn/LEN*100)+"%";
        const finished=reached>=N;
        doneBadge.style.opacity=finished?1:0;
        nib.style.opacity=finished?0:1;
        const bc=document.getElementById("bookCard");
        if(bc.dataset.ready) bc.classList.toggle("show",finished);
        const nb=document.getElementById("nextBtn");
        if(nb.dataset.ready) nb.classList.toggle("show",finished);
        if(finished&&playing){ playing=false; setPlayLabel(); }
      }

      function frame(ts){
        raf=null;
        if(last!=null&&playing){
          const dt=Math.min(0.1,(ts-last)/1000);   // clamp: no jump after a background tab
          drawn=Math.min(LEN,drawn+dt*speed*LEN/DURATION);
          update();
        }
        last=ts;
        if(playing&&drawn<LEN) raf=requestAnimationFrame(frame);
        else last=null;
      }
      function run(){ if(!raf){ last=null; raf=requestAnimationFrame(frame); } }

      const playBtn=$("playBtn");
      function setPlayLabel(){ playBtn.textContent = playing ? "Pause" : (drawn>=LEN ? "Replay" : "Play"); }
      function toggle(){
        if(!playing&&drawn>=LEN){ restart(); return; }   // Replay
        playing=!playing; setPlayLabel();
        if(playing) run();
      }
      function restart(){
        drawn=0; playing=true; setPlayLabel();
        update(); run();
      }
      playBtn.addEventListener("click",toggle);
      $("restartBtn").addEventListener("click",restart);
      $("speedBtn").addEventListener("click",e=>{
        speed=SPEEDS[(SPEEDS.indexOf(speed)+1)%SPEEDS.length];
        e.target.textContent=speed+"×";
      });
      $("stage").addEventListener("click",toggle);
      document.addEventListener("keydown",e=>{
        if(e.code==="Space"){ e.preventDefault(); toggle(); }
      });

      update(); run();
    }

    // ?art=<id> loader. Anything invalid or missing falls back to the embedded default.
    (function(){
      const artId=(new URLSearchParams(location.search).get("art")||"").toLowerCase();
      if(!artId||artId==="elvis"){ boot(EMBEDDED); return; }
      if(!/^[a-z0-9-]+$/.test(artId)){ console.warn("Invalid art id — showing default artwork."); boot(EMBEDDED); return; }
      const s=document.createElement("script");
      s.src="art/"+artId+".js";
      s.onload=function(){
        const a=window.ARTWORKS&&window.ARTWORKS[artId];
        if(a) boot(a);
        else { console.warn("art/"+artId+".js did not define ARTWORKS['"+artId+"'] — showing default artwork."); boot(EMBEDDED); }
      };
      s.onerror=function(){ console.warn("Artwork '"+artId+"' not found — showing default artwork."); boot(EMBEDDED); };
      document.head.appendChild(s);
    })();

    // Featured-drawings switcher + completion book card (data from art/manifest.js).
    // Optional: if the manifest is missing, the button never appears and the page
    // behaves exactly as before.
    (function(){
      function coverEl(a){
        const d=document.createElement("div"); d.className="galCover";
        function letter(){
          let n=a.book||a.title||"?";
          if(n.indexOf(":")>-1) n=n.slice(n.lastIndexOf(":")+1);
          d.textContent=n.trim().replace(/^The\s+/i,"").charAt(0).toUpperCase();
        }
        if(a.cover){
          const img=document.createElement("img"); img.src=a.cover; img.alt="";
          img.onerror=function(){ img.remove(); letter(); };
          d.appendChild(img);
        } else letter();
        return d;
      }
      const s=document.createElement("script");
      s.src="art/manifest.js";
      s.onload=function(){
        const list=window.ART_MANIFEST;
        if(!Array.isArray(list)||!list.length) return;
        const cur=(new URLSearchParams(location.search).get("art")||"elvis").toLowerCase();
        const gal=document.getElementById("gallery");
        list.forEach(function(a){
          const item=document.createElement("a");
          item.className="galItem"+(a.id===cur?" current":"");
          item.href="?art="+encodeURIComponent(a.id);
          item.appendChild(coverEl(a));
          const tx=document.createElement("div");
          const t1=document.createElement("div"); t1.className="galTitle"; t1.textContent=a.title;
          const t2=document.createElement("div"); t2.className="galBook"; t2.textContent=a.book||"";
          tx.appendChild(t1); tx.appendChild(t2); item.appendChild(tx);
          gal.appendChild(item);
        });
        const btn=document.getElementById("galBtn");
        btn.style.display="";
        btn.addEventListener("click",function(e){ e.stopPropagation(); gal.classList.toggle("open"); });
        document.addEventListener("pointerdown",function(e){ if(!gal.contains(e.target)&&e.target!==btn) gal.classList.remove("open"); });
        const info=list.find(function(a){ return a.id===cur; });
        if(info&&info.book){
          const bc=document.getElementById("bookCard");
          bc.appendChild(coverEl(info));
          const tx=document.createElement("div");
          const l1=document.createElement("div"); l1.className="bcFrom"; l1.textContent="From the book";
          const l2=document.createElement("div"); l2.className="bcBook"; l2.textContent=info.book;
          tx.appendChild(l1); tx.appendChild(l2);
          if(info.buy){
            const a=document.createElement("a"); a.className="bcBuy"; a.href=info.buy;
            a.target="_blank"; a.rel="noopener"; a.textContent="Get the book";
            tx.appendChild(a);
          }
          bc.appendChild(tx);
          bc.dataset.ready="1";
        }
        // "Next drawing" prompt at the completion beat (manifest order, wraps around).
        const idx=list.findIndex(function(a){ return a.id===cur; });
        const next=list.length>1?list[(idx+1)%list.length]:null;
        if(next&&next.id!==cur){
          const nb=document.getElementById("nextBtn");
          nb.href="?art="+encodeURIComponent(next.id);
          nb.textContent="Next: "+next.title+" →";
          nb.dataset.ready="1";
        }
      };
      s.onerror=function(){};
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
