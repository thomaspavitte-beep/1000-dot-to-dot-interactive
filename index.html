<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>1000 Dot-to-Dot &middot; Scroll to Draw</title>
<style>
  :root{ --ink:#111418; --dot:#9fa5ad; --dotDone:#111418; --accent:#e4572e; --bg:#fbfbf9; --muted:#8a9099; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;}
  #track{height:700vh;position:relative;}
  #stage{position:sticky;top:0;height:100vh;display:flex;align-items:center;
    justify-content:center;overflow:hidden;}
  svg{width:min(94vw,94vh);height:min(94vw,94vh);display:block;}
  #full{fill:none;stroke:none;}                 /* hidden; only used for measuring */
  .ink{fill:none;stroke:var(--ink);stroke-width:2;stroke-linecap:round;
    stroke-linejoin:round;}  /* width set in user units at boot so the mini + finale scale it proportionally */
  .dot{fill:var(--dot);transition:fill .25s;}
  .dot.done{fill:var(--dotDone);}
  .num{fill:var(--muted);font-size:7px;font-family:inherit;pointer-events:none;opacity:0;}
  body.shownums .num{opacity:.75;}
  #bar{position:fixed;left:0;top:0;height:3px;width:0%;background:var(--accent);z-index:5;}
  #hud{position:fixed;left:0;right:0;top:0;padding:16px 20px;display:flex;align-items:baseline;gap:14px;pointer-events:none;}
  #title{font-size:15px;font-weight:700;}
  #title span{font-weight:400;color:var(--muted);}
  #credit{font-size:11px;color:var(--muted);}
  #count{margin-left:auto;font-variant-numeric:tabular-nums;font-size:14px;font-weight:600;color:var(--muted);}
  #btns{position:fixed;right:20px;bottom:22px;z-index:6;}
  #btns{display:flex;gap:8px;}
  #btns button,#btns a{font:inherit;font-size:13px;font-weight:600;color:var(--ink);background:#fff;
    border:1px solid #d7dbe0;border-radius:999px;padding:7px 14px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.05);
    text-decoration:none;display:inline-block;}
  #btns button:hover,#btns a:hover{border-color:var(--accent);color:var(--accent);}
  #hint{position:fixed;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;font-size:19px;font-weight:600;color:var(--muted);transition:opacity .4s;pointer-events:none;}
  #done{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;transition:opacity .5s;pointer-events:none;}
  /* "From a distance" mini — live <use> mirror of the artwork */
  #mini{position:fixed;left:20px;bottom:22px;width:140px;z-index:4;cursor:pointer;
    opacity:0;pointer-events:none;transition:opacity .5s,width .3s ease;}
  #mini.show{opacity:1;pointer-events:auto;}
  #mini.big{width:280px;}
  #miniSvg{display:block;width:100%;height:auto;background:#fff;
    border:1px solid #d7dbe0;border-radius:10px;}
  #miniLabel{font-size:11px;color:var(--muted);text-align:center;margin-top:5px;}
  @media (max-width:600px){
    #mini{width:92px;left:16px;bottom:106px;}  /* clears the hint and the wrapped button rows */
    #mini.big{width:180px;}
    #miniLabel{display:none;}
  }
  /* "Next drawing" prompt at the completion beat (populated from art/manifest.js) */
  #nextBtn{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--accent);color:#fff;
    padding:9px 18px;border-radius:999px;font-size:13px;font-weight:600;text-decoration:none;z-index:6;
    opacity:0;pointer-events:none;transition:opacity .5s;box-shadow:0 2px 8px rgba(228,87,46,.35);}
  #nextBtn.show{opacity:1;pointer-events:auto;}
  #nextBtn:hover{background:var(--ink);}
  @media (max-width:600px){
    #nextBtn{top:64px;bottom:auto;}   /* clear of the wrapped button rows */
  }
  /* Featured-drawings switcher (populated from art/manifest.js) */
  #gallery{position:fixed;right:20px;bottom:64px;background:#fff;border:1px solid #d7dbe0;border-radius:14px;
    padding:8px;z-index:7;box-shadow:0 8px 28px rgba(0,0,0,.12);display:none;max-height:60vh;overflow:auto;
    min-width:240px;max-width:calc(100vw - 40px);}
  #gallery.open{display:block;}
  .galItem{display:flex;gap:10px;align-items:center;padding:7px 9px;border-radius:10px;text-decoration:none;color:var(--ink);}
  .galItem:hover{background:#f2f4f6;}
  .galItem.current{outline:2px solid var(--accent);}
  .galCover{width:34px;height:46px;border-radius:4px;background:#e8ebee;flex:0 0 auto;display:flex;
    align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--muted);overflow:hidden;}
  .galCover img{width:100%;height:100%;object-fit:cover;display:block;}
  .galTitle{font-size:13px;font-weight:700;}
  .galBook{font-size:11px;color:var(--muted);}
  /* Book card shown at the completion moment */
  #bookCard{position:fixed;left:50%;bottom:118px;transform:translateX(-50%);display:flex;gap:12px;align-items:center;
    background:#fff;border:1px solid #d7dbe0;border-radius:14px;padding:10px 14px;opacity:0;transition:opacity .5s;
    pointer-events:none;z-index:5;box-shadow:0 4px 18px rgba(0,0,0,.1);}
  #bookCard.show{opacity:1;pointer-events:auto;}
  #bookCard .galCover{width:44px;height:60px;font-size:18px;}
  .bcFrom{font-size:11px;color:var(--muted);}
  .bcBook{font-size:13px;font-weight:700;max-width:240px;}
  .bcBuy{font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;}
  .bcBuy:hover{text-decoration:underline;}
</style>
</head>

    window.addEventListener("scroll",onScroll,{passive:true});
    window.addEventListener("resize",()=>{
      const b=full.getBBox(),pd=Math.max(b.width,b.height)*0.04;
      const v=[b.x-pd,b.y-pd,b.width+2*pd,b.height+2*pd].join(" ");
      svg.setAttribute("viewBox",v);
      document.getElementById("miniSvg").setAttribute("viewBox",v);
      inkWidth();
    });
    document.getElementById("toggleNums").addEventListener("click",e=>{
      document.body.classList.toggle("shownums");
      e.target.textContent=document.body.classList.contains("shownums")?"Hide numbers":"Show numbers";
    });
    onScroll();
    } // end boot(art)

    // ?art=<id> loader. Anything invalid or missing falls back to the embedded default.
    (function(){
      const artId=(new URLSearchParams(location.search).get("art")||"").toLowerCase();
      if(!artId||artId==="elvis"){ boot(EMBEDDED); return; }
      if(!/^[a-z0-9-]+$/.test(artId)){ console.warn("Invalid art id — showing default artwork."); boot(EMBEDDED); return; }
      const s=document.createElement("script");
      s.src="art/"+artId+".js";
      s.onload=function(){
        const a=window.ARTWORKS&&window.ARTWORKS[artId];
        if(a) boot(a);
        else { console.warn("art/"+artId+".js did not define ARTWORKS['"+artId+"'] — showing default artwork."); boot(EMBEDDED); }
      };
      s.onerror=function(){ console.warn("Artwork '"+artId+"' not found — showing default artwork."); boot(EMBEDDED); };
      document.head.appendChild(s);
    })();

    // Featured-drawings switcher + completion book card (data from art/manifest.js).
    // Optional: if the manifest is missing, the button never appears and the page
    // behaves exactly as before.
    (function(){
      function coverEl(a){
        const d=document.createElement("div"); d.className="galCover";
        function letter(){
          let n=a.book||a.title||"?";
          if(n.indexOf(":")>-1) n=n.slice(n.lastIndexOf(":")+1);
          d.textContent=n.trim().replace(/^The\s+/i,"").charAt(0).toUpperCase();
        }
        if(a.cover){
          const img=document.createElement("img"); img.src=a.cover; img.alt="";
          img.onerror=function(){ img.remove(); letter(); };
          d.appendChild(img);
        } else letter();
        return d;
      }
      const s=document.createElement("script");
      s.src="art/manifest.js";
      s.onload=function(){
        const list=window.ART_MANIFEST;
        if(!Array.isArray(list)||!list.length) return;
        const cur=(new URLSearchParams(location.search).get("art")||"elvis").toLowerCase();
        const gal=document.getElementById("gallery");
        list.forEach(function(a){
          const item=document.createElement("a");
          item.className="galItem"+(a.id===cur?" current":"");
          item.href="?art="+encodeURIComponent(a.id);
          item.appendChild(coverEl(a));
          const tx=document.createElement("div");
          const t1=document.createElement("div"); t1.className="galTitle"; t1.textContent=a.title;
          const t2=document.createElement("div"); t2.className="galBook"; t2.textContent=a.book||"";
          tx.appendChild(t1); tx.appendChild(t2); item.appendChild(tx);
          gal.appendChild(item);
        });
        const btn=document.getElementById("galBtn");
        btn.style.display="";
        btn.addEventListener("click",function(e){ e.stopPropagation(); gal.classList.toggle("open"); });
        document.addEventListener("pointerdown",function(e){ if(!gal.contains(e.target)&&e.target!==btn) gal.classList.remove("open"); });
        const info=list.find(function(a){ return a.id===cur; });
        if(info&&info.book){
          const bc=document.getElementById("bookCard");
          bc.appendChild(coverEl(info));
          const tx=document.createElement("div");
          const l1=document.createElement("div"); l1.className="bcFrom"; l1.textContent="From the book";
          const l2=document.createElement("div"); l2.className="bcBook"; l2.textContent=info.book;
          tx.appendChild(l1); tx.appendChild(l2);
          if(info.buy){
            const a=document.createElement("a"); a.className="bcBuy"; a.href=info.buy;
            a.target="_blank"; a.rel="noopener"; a.textContent="Get the book";
            tx.appendChild(a);
          }
          bc.appendChild(tx);
          bc.dataset.ready="1";
        }
        // "Next drawing" prompt at the completion beat (manifest order, wraps around).
        const idx=list.findIndex(function(a){ return a.id===cur; });
        const next=list.length>1?list[(idx+1)%list.length]:null;
        if(next&&next.id!==cur){
          const nb=document.getElementById("nextBtn");
          nb.href="?art="+encodeURIComponent(next.id);
          nb.textContent="Next: "+next.title+" →";
          nb.dataset.ready="1";
        }
      };
      s.onerror=function(){};
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
